name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag used for image and artifact names."
        required: true
        default: "v0.4.2"
      publish_release:
        description: "Upload artifacts to a GitHub Release for the version input."
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: alterego-42

jobs:
  docker:
    name: Build and publish Docker target
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [api, worker, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${{ inputs.version }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/yunwu-custom-api-${{ matrix.target }}:${{ steps.version.outputs.value }}
          build-args: |
            VITE_API_BASE_URL=/
            VITE_CONVERSATION_SSE_PATH_TEMPLATE=/conversations/:id/events

  windows-portable:
    name: Build Electron Windows portable zip
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "value=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "value=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          }

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron portable package
        run: pnpm desktop:package

      - name: Upload Electron portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yunwu-Desktop-${{ steps.version.outputs.value }}-win-x64-portable
          path: apps/desktop/release/*portable.zip
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release artifact
    runs-on: ubuntu-latest
    needs: [docker, windows-portable]
    if: github.ref_type == 'tag' || inputs.publish_release
    steps:
      - name: Set release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${{ inputs.version }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: Yunwu-Desktop-${{ steps.version.outputs.value }}-win-x64-portable
          path: release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: release/*portable.zip
          generate_release_notes: true
